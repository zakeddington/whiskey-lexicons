<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Catalog | Cask & Quill</title>
	<link rel="icon" type="image/png" href="/assets/images/favicon/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg" />
	<link rel="shortcut icon" href="/assets/images/favicon/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
	<link rel="manifest" href="/assets/images/favicon/site.webmanifest" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/assets/styles/styles.css">
</head>
<body>
	<header class="header">
		<nav class="nav">
			<a class="nav-logo" href="/">
				<img class="nav-logo-img" src="/assets/images/logo.png" alt="Cask & Quill Logo">
			</a>
			<div class="nav-buttons">
				<a id="regions-btn" class="button nav-btn" href="/">Regions</a>
				<a id="lexicon-btn" class="button nav-btn" href="/lexicon/">Lexicon</a>
				<a id="catalog-btn" class="button nav-btn active" href="/catalog/">Catalog</a>
			</div>
		</nav>
	</header>

	<main class="main-content">
		<div class="catalog-container">
			<section class="hero grid">
				<div class="hero-heading grid-col-md-12 grid-col-lg-7">
					<h1 class="hero-title">Catalog</h1>
					<p>A working ledger of bottles, production notes, mash bills, and tasting impressions from the private collection.</p>
				</div>
			</section>

			<section class="catalog-heading">
				<div class="catalog-controls-row">
					<div class="catalog-search-container">
						<input type="search" id="catalog-search" placeholder="Search bottles..." class="catalog-search-input" aria-label="Search bottles">
					</div>
					<div class="catalog-filter-controls">
						<select id="catalog-filter" class="catalog-filter-select" aria-label="Filter catalog">
							<option value="">Filter</option>
						</select>
					</div>
				</div>
				<p id="catalog-count" class="catalog-count text-body-sm">0 bottles</p>
			</section>

			<div id="catalog-list" class="catalog-list">
				<!-- Bottles will be populated by JavaScript -->
			</div>
		</div>
	</main>

	<div id="catalog-modal-root" class="catalog-modal-root" aria-live="polite"></div>

	<script type="module" src="/assets/scripts/scripts.js"></script>
</body>
</html>
